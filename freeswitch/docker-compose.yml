# ============================================================
# FreeSWITCH + FunASR + mod_audio_fork 容器化部署
#
# 启动：
#   docker compose -f freeswitch/docker-compose.yml up -d
#
# 验证：
#   docker compose -f freeswitch/docker-compose.yml logs -f freeswitch
#   docker exec ai-call-freeswitch fs_cli -x "sofia status"
#
# 连接 SIP 软电话（MicroSIP）：
#   - 服务器地址：localhost
#   - 端口：5060
#   - 用户名：1000 / 1001（默认配置在 conf/directory/default/）
#   - 密码：由 scripts/dev-outbound.ps1 随机生成，不写入仓库或日志
#
# 拨打测试分机 9999：
#   拨号后 FreeSWITCH 会将 RTP 音频 fork 到 mod_audio_fork 配置的 WebSocket 服务器
#   （Voice Agent 端监听 ws://host.docker.internal:8090/audio-stream 接收音频流）
#
# FunASR STT 服务（:10095）：
#   Voice Agent 通过 STT_PROVIDER=funasr 连接 ws://localhost:10095
# ============================================================
services:
  freeswitch:
    build: .
    container_name: ai-call-freeswitch
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # 配置文件挂载（完整替换镜像默认配置）。本机真实外呼时，编排器通过
      # FREESWITCH_VARS_FILE 再覆盖 vars.xml；默认文件只提供不可用的安全占位值。
      - type: bind
        source: ./conf
        target: /usr/local/freeswitch/conf
        read_only: true
      - type: bind
        source: ${FREESWITCH_VARS_FILE:-./conf/vars.xml}
        target: /usr/local/freeswitch/conf/vars.xml
        read_only: true
      # 录音与日志
      - type: bind
        source: ./recordings
        target: /var/lib/freeswitch/recordings
      - type: bind
        source: ./logs
        target: /var/log/freeswitch
    environment:
      - TZ=Asia/Shanghai
    # ESL 外部访问（用于 NestJS 后端通过 ESL 控制呼叫）
    ports:
      - "5060:5060/udp"   # SIP UDP
      - "5060:5060/tcp"   # SIP TCP
      - "127.0.0.1:18021:8021/tcp" # ESL Event Socket（避开 Windows 本机 8021 代理冲突）
      - "16384-16394:16384-16394/udp"  # RTP 媒体流端口范围（缩小到10个端口，足够单通话测试）
    # drachtio 镜像二进制路径为 /usr/local/freeswitch/bin/freeswitch
    # 禁用镜像内置 STUN/UPnP，避免覆盖 vars.xml 中的宿主机 SIP/RTP 地址
    # 覆盖镜像 entrypoint：它的 sed -i 会因只读 conf 挂载失败而重启循环；
    # 我们的 conf 目录已预配好 listen-ip/acl/端口，不需要 entrypoint 动态修改。
    entrypoint: []
    command: /usr/local/freeswitch/bin/freeswitch -nf -nc -c -nonat -nonatmap

  # FunASR 语音识别服务（开源，本地部署）
  # 镜像 tag 请按需选择：online-cpu / online-gpu / offline-cpu
  funasr:
    image: registry.cn-hangzhou.aliyuncs.com/funasr_repo/funasr:funasr-runtime-sdk-online-cpu-0.1.12
    container_name: ai-call-funasr
    restart: unless-stopped
    ports:
      - "10095:10095"
    environment:
      - TZ=Asia/Shanghai
    # FUNASR_HOTWORDS 可通过环境变量传入热词（重启生效）
    # 在 .env 中配置 FUNASR_HOTWORDS 后取消注释：
    # env_file:
    #   - ../.env
